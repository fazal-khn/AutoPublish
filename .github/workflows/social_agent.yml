name: Editorial Design Social Media Agent

on:
  # Schedule to run every Monday, Wednesday, and Friday at 10:00 AM UTC
  schedule:
    - cron: '0 10 * * 1,3,5'
  
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  post-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r editorial_agent/requirements.txt

      - name: Run Social Media Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          # Make sure to update this with your actual GitHub username and repository name
          GITHUB_REPO_RAW_URL: "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/editorial_agent/portfolio/"
          DRY_RUN: "False" # Set to "False" to actually post
        run: python editorial_agent/main.py

      - name: Commit and push posted state
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add editorial_agent/posted_images.json || echo "No state changes to add"
          git commit -m "chore: Update posted_images.json [skip ci]" || echo "No changes to commit"
          git push
